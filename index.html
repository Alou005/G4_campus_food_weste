<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Food West – Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    /* ── Phone Frame ── */
    .android-frame {
      width: 393px;
      height: 852px;
      background: #f5f7e8;
      border: 8px solid #161616;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 0 0 2px #444,
        0 30px 80px rgba(0,0,0,.35);
    }

    /* ── Dynamic Island ── */
    .dynamic-island {
      width: 126px;
      height: 36px;
      background: #1a1a1a;
      border-radius: 0 0 24px 24px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    /* ── Background Pattern ── */
    .bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      pointer-events: none;
      z-index: 0;
    }
    .bg-pattern img { width: 150%; height: 120%; }

    /* ── Scrollable Content ── */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px 20px 20px;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      scrollbar-width: none;
    }
    .screen-content::-webkit-scrollbar { display: none; }

    /* ── Top Bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 60px;
      height: 45px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 13.5px;
      font-weight: 700;
      color: #1a1a0a;
      letter-spacing: 0.6px;
      line-height: 1.3;
      text-transform: uppercase;
    }

    .settings-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      flex-shrink: 0;
    }
    .settings-btn:hover { background: rgba(0,0,0,0.14); }
    .settings-btn svg { width: 20px; height: 20px; fill: #2a2a1a; }

    /* ── Greeting ── */
    .greeting {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0 14px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #1a1a1a;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .greeting-info .hello {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      line-height: 1.2;
    }

    .greeting-info .date {
      font-size: 12px;
      color: #666;
      font-weight: 400;
      margin-top: 2px;
    }

    /* ── Cards ── */
    .card {
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      margin-bottom: 14px;
    }

    /* Card 1 – Status */
    .card-status {
      background: linear-gradient(135deg, #ff9a00 0%, #c43000 42%, #0011f4 100%);
      padding: 20px 22px 22px;
      min-height: 130px;
    }

    .card-status-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .card-status-header .card-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .status-value {
      font-size: 44px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1;
    }

    /* Card 2 – Daily Manage */
    .card-daily {
      background: linear-gradient(135deg, #0d0600 0%, #2e1200 40%, #ff9a00 100%);
      padding: 18px 22px 20px;
    }

    .card-daily-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 14px;
    }

    .card-daily-header .card-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .meal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .meal-row:last-child { border-bottom: none; }

    .meal-name {
      font-size: 15px;
      font-weight: 500;
      color: #ffffff;
    }

    .checkbox {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: 2px solid rgba(255,255,255,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.2s;
    }

    .checkbox.checked {
      background: rgba(255,255,255,0.92);
      border-color: transparent;
    }

    .checkbox.checked svg { display: block; }
    .checkbox .check-svg { display: none; width: 15px; height: 15px; }

    /* Card 3 – Score */
    .card-score {
      background: linear-gradient(135deg, #0011f4 0%, #000830 55%, #000000 100%);
      padding: 18px 22px 22px;
      margin-bottom: 0;
    }

    .card-score-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .card-score-header .card-label {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .score-number {
      font-size: 18px;
      font-weight: 400;
      color: #ffffff;
      margin-bottom: 12px;
      line-height: 1;
    }

    .progress-track {
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      height: 10px;
      width: 100%;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 25%;
      background: linear-gradient(90deg, #ff9a00, #ffcc00);
      border-radius: 50px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
    }

    .progress-meta span {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
    }

    /* ── Bottom Navigation ── */
    .bottom-nav {
      height: 84px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      position: relative;
      flex-shrink: 0;
      z-index: 10;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
      color: #ffffff;
      padding: 10px 18px;
      border-radius: 16px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .nav-item.active { background: #333; }

    .nav-label {
      font-size: 11px;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
    }

    /* Floating Camera Button */
    .cam-fab {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #ff9a00;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%) translateY(-26px);
      box-shadow: 0 6px 20px rgba(255,154,0,0.5);
      cursor: pointer;
      border: 4px solid #1a1a1a;
      transition: transform 0.2s;
    }
    .cam-fab:hover { transform: translateX(-50%) translateY(-28px) scale(1.05); }

    .nav-spacer { width: 64px; }
  </style>
</head>
<body>

  <div class="android-frame">

    <!-- Dynamic Island -->
    <div class="dynamic-island"></div>

    <!-- Background pattern -->
    <div class="bg-pattern">
      <img src="Element/Background.png" alt="" />
    </div>

    <!-- Scrollable screen content -->
    <div class="screen-content">

      <!-- Top Bar -->
      <div class="topbar">
        <div class="logo-wrap">
          <img src="Element/Logo.png" alt="Campus Food West Logo" class="logo-icon" />
          <div class="logo-text">Campus Food West</div>
        </div>

        <button class="settings-btn" aria-label="Settings">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.01 7.01 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.47.41l-.36 2.54a7.06 7.06 0 0 0-1.62.94l-2.39-.96a.47.47 0 0 0-.59.22L2.74 8.87a.47.47 0 0 0 .12.61l2.03 1.58a7.2 7.2 0 0 0-.07.94c0 .32.02.64.07.94l-2.03 1.58a.47.47 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.05.24.27.41.48.41h3.84c.21 0 .43-.17.47-.41l.36-2.54a6.94 6.94 0 0 0 1.62-.94l2.39.96c.22.08.47.01.59-.22l1.92-3.32a.47.47 0 0 0-.12-.61ZM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2Z"/>
          </svg>
        </button>
      </div>

      <!-- Greeting -->
      <div class="greeting">
        <div class="avatar">A</div>
        <div class="greeting-info">
          <div class="hello">Hello, Alou</div>
          <div class="date">Wed, Jun 25</div>
        </div>
      </div>

      <!-- Card 1: Your Status -->
      <div class="card card-status">
        <div class="card-status-header">
          <img src="Element/First Box Icon.png" alt="Status Icon" width="25" height="20" />
          <span class="card-label">Your Status</span>
        </div>
        <div class="status-value">ACTIVE</div>
      </div>

      <!-- Card 2: Daily Manage -->
      <div class="card card-daily">
        <div class="card-daily-header">
          <span class="card-label">Daily Manage</span>
          <img src="Element/Second Box Icon.png" alt="Clock Icon" width="30" height="20" />
        </div>

        <div class="meal-row">
          <span class="meal-name">Breakfast</span>
          <div class="checkbox checked" role="checkbox" aria-checked="true">
            <svg class="check-svg" viewBox="0 0 15 15" fill="none" stroke="#ff9a00" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2 8 6 12 13 3"/>
            </svg>
          </div>
        </div>
        <div class="meal-row">
          <span class="meal-name">Lunch</span>
          <div class="checkbox" role="checkbox" aria-checked="false"></div>
        </div>
        <div class="meal-row">
          <span class="meal-name">Dinner</span>
          <div class="checkbox" role="checkbox" aria-checked="false"></div>
        </div>
      </div>

      <!-- Card 3: Score -->
      <div class="card card-score">
        <div class="card-score-header">
          <img src="Element/Third Box Icon.png" alt="Stars Icon" width="30" height="20" />
          <span class="card-label">Score!</span>
        </div>
        <div class="score-number">25%</div>
        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>
        <div class="progress-meta">
          <span>Score goal: 100%</span>
          <span>Keep going</span>
        </div>
      </div>

    </div><!-- end .screen-content -->

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" aria-label="Main navigation">

      <!-- Home (active on this page) -->
      <a href="index.html" class="nav-item active">
        <img src="Element/Home.png" alt="Home Icon" width="30" height="20" />
        <span class="nav-label">Home</span>
      </a>

      <!-- Spacer for FAB -->
      <div class="nav-spacer"></div>

      <!-- Profile -->
      <a href="profile.html" class="nav-item">
        <img src="Element/Profile.png" alt="Profile Icon" width="38" height="25" />
        <span class="nav-label">Profile</span>
      </a>

      <!-- Floating Camera Button -->
      <div class="cam-fab" role="button" aria-label="Scan food" onclick="window.location.href='scanner.html'">
        <img src="Element/Camera Icon.png" alt="Camera Icon" width="40" height="28" />
      </div>

    </nav>

  </div><!-- end .android-frame -->

</body>
</html>
