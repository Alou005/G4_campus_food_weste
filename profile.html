<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Campus Food West – Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f7e8; display: flex;
      flex-direction: column; height: 100dvh;
    }
    .bg-pattern {
      position: fixed; inset: 0; opacity: 0.05;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-pattern img { width: 150%; height: 120%; }
    .screen-content {
      flex: 1; overflow-y: auto;
      padding-top: max(env(safe-area-inset-top), 14px);
      padding-left: 20px; padding-right: 20px; padding-bottom: 20px;
      position: relative; z-index: 2;
      display: flex; flex-direction: column; scrollbar-width: none;
    }
    .screen-content::-webkit-scrollbar { display: none; }

    /* Header */
    .header-row {
      display: flex; align-items: center; justify-content: center;
      position: relative; padding-bottom: 14px;
    }
    .back-btn {
      position: absolute; left: 0; width: 36px; height: 36px;
      border-radius: 50%; background: #000;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; flex-shrink: 0;
    }
    .page-title {
      font-family: 'Playfair Display', serif; font-size: 22px;
      font-weight: 700; color: #1a1a0a; letter-spacing: 0.4px;
    }

    /* Points bar */
    .points-bar {
      background: #58b947; color: #fff; border-radius: 14px 14px 0 0;
      padding: 7px 14px; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .points-bar .pts-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .pts-today-badge {
      font-size: 11px; font-weight: 500;
      background: rgba(0,0,0,0.18); border-radius: 20px; padding: 2px 8px;
      color: rgba(255,255,255,0.85);
    }

    /* Profile card */
    .profile-card {
      background: #000; color: #fff;
      border-radius: 0 0 20px 20px; padding: 20px 22px 24px; margin-bottom: 14px;
    }
    .avatar {
      width: 72px; height: 72px; border: 3px solid #fff; border-radius: 50%;
      margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; background: #333;
    }
    .profile-name { text-align: center; font-size: 17px; font-weight: 700; margin-bottom: 16px; letter-spacing: 0.3px; }
    .info-row {
      display: flex; justify-content: space-between; padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: rgba(255,255,255,0.55); font-weight: 400; }
    .info-value { font-weight: 600; color: #fff; }
    .info-value.pts { color: #ffcc00; font-size: 15px; }

    /* Today summary */
    .today-summary {
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .today-summary-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,0.35); margin-bottom: 10px; font-weight: 600;
    }
    .meal-pill-row { display: flex; flex-direction: column; gap: 8px; }

    /* Each pill now shows more info when done */
    .meal-pill {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.07); border-radius: 12px;
      padding: 8px 14px; font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1);
    }
    .meal-pill.done {
      background: rgba(88,185,71,0.15); color: #7de86a; border-color: #58b947;
    }
    .meal-pill .pill-left  { display: flex; align-items: center; gap: 6px; }
    .meal-pill .pill-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .pill-pts   { font-weight: 700; font-size: 13px; }
    .pill-label { font-size: 10px; opacity: 0.7; }

    /* Menu card */
    .menu-card { background: #fff; border-radius: 20px; overflow: hidden; }
    .menu-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; border-bottom: 1px solid #f0f0e8;
      cursor: pointer; transition: background 0.15s;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: #fafaf2; }
    .menu-left {
      display: flex; align-items: center; gap: 12px;
      font-size: 15px; font-weight: 500; color: #1a1a1a;
    }
    .menu-left.logout { color: #cc0000; }
    .menu-arrow { font-size: 20px; color: #bbb; }

    /* Bottom Nav */
    .bottom-nav {
      background: #1a1a1a; display: flex; align-items: center;
      justify-content: space-between; padding: 0 44px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      height: calc(70px + env(safe-area-inset-bottom, 0px));
      position: relative; flex-shrink: 0; z-index: 10;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; text-decoration: none;
      color: #fff; padding: 8px 18px; border-radius: 16px; transition: background 0.2s; cursor: pointer;
    }
    .nav-item.active { background: #333; }
    .nav-label { font-size: 11px; color: #fff; font-family: 'Poppins', sans-serif; font-weight: 400; }
    .cam-fab {
      width: 64px; height: 64px; border-radius: 50%; background: #ff9a00;
      display: flex; align-items: center; justify-content: center;
      position: absolute; left: 50%; transform: translateX(-50%) translateY(-26px);
      box-shadow: 0 6px 20px rgba(255,154,0,0.5); cursor: pointer;
      border: 4px solid #1a1a1a; transition: transform 0.2s;
    }
    .cam-fab:hover { transform: translateX(-50%) translateY(-28px) scale(1.05); }
    .nav-spacer { width: 64px; }
  </style>
</head>
<body>

  <div class="bg-pattern">
    <img src="Element/Background.png" alt="" />
  </div>

  <div class="screen-content">

    <!-- Header -->
    <div class="header-row">
      <a href="index.html" class="back-btn" aria-label="Back">
        <img src="Element/Black back.png" alt="Back" width="20" height="14" />
      </a>
      <span class="page-title">Profile</span>
    </div>

    <!-- Points bar -->
    <div class="points-bar">
      <img src="Element/Point.png" width="28" height="20" alt="Points" />
      <span id="totalPtsDisplay">0 pts</span>
      <div class="pts-right">
        <span class="pts-today-badge" id="todayPtsDisplay">+0 today</span>
        <img src="Element/Third Box Icon.png" width="28" height="20" alt="" />
      </div>
    </div>

    <!-- Profile card -->
    <div class="profile-card">
      <div class="avatar">A</div>
      <div class="profile-name">Alou Yonglouher</div>
      <div class="info-row">
        <span class="info-label">Student ID</span>
        <span class="info-value">225N000226</span>
      </div>
      <div class="info-row">
        <span class="info-label">Phone Number</span>
        <span class="info-value">20 77 826 451</span>
      </div>
      <div class="info-row">
        <span class="info-label">Year of Study</span>
        <span class="info-value">Year 2</span>
      </div>
      <div class="info-row">
        <span class="info-label">Student Status</span>
        <span class="info-value">Studying</span>
      </div>
      <div class="info-row">
        <span class="info-label">Total Points</span>
        <span class="info-value pts" id="totalPtsCard">0 pts</span>
      </div>

      <!-- Today's meal summary -->
      <div class="today-summary">
        <div class="today-summary-title">Today's Scans</div>
        <div class="meal-pill-row" id="mealPillRow">
          <!-- rendered by JS -->
        </div>
      </div>
    </div>

    <!-- Menu -->
    <div class="menu-card">
      <div class="menu-item">
        <div class="menu-left">
          <img src="Element/Password.png" width="28" height="22" alt="" />
          Change password
        </div>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item">
        <div class="menu-left">
          <img src="Element/Help.png" width="28" height="22" alt="" />
          Get help
        </div>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item" onclick="resetPoints()">
        <div class="menu-left" style="color:#888;">
          <img src="Element/Help.png" width="28" height="22" alt="" />
          Reset today's data (dev)
        </div>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item">
        <div class="menu-left logout">
          <img src="Element/Logout.png" width="28" height="22" alt="" />
          Log out
        </div>
        <span class="menu-arrow" style="color:#cc0000;">›</span>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="index.html" class="nav-item">
      <img src="Element/Home.png" alt="Home" width="30" height="20" />
      <span class="nav-label">Home</span>
    </a>
    <div class="nav-spacer"></div>
    <a href="profile.html" class="nav-item active">
      <img src="Element/Profile.png" alt="Profile" width="38" height="25" />
      <span class="nav-label">Profile</span>
    </a>
    <div class="cam-fab" role="button" aria-label="Scan food" onclick="window.location.href='scanner.html'">
      <img src="Element/Camera Icon.png" alt="Camera" width="40" height="28" />
    </div>
  </nav>

<script>
  // ── State helper (same reset logic as other pages) ──
  function getState() {
    const today = new Date().toDateString();
    let state = null;
    try { state = JSON.parse(localStorage.getItem('cfwState')); } catch(e) {}
    if (!state || state.date !== today) {
      state = {
        date: today,
        totalPoints: (state && state.totalPoints) ? state.totalPoints : 0,
        meals: { Breakfast: null, Lunch: null, Dinner: null }
      };
      localStorage.setItem('cfwState', JSON.stringify(state));
    }
    if (!state.meals) state.meals = { Breakfast: null, Lunch: null, Dinner: null };
    return state;
  }

  const MEAL_META = {
    Breakfast: { icon: '🌅' },
    Lunch:     { icon: '☀️' },
    Dinner:    { icon: '🌙' }
  };

  function renderProfile() {
    const state = getState();

    // Total points
    document.getElementById('totalPtsDisplay').textContent = (state.totalPoints || 0) + ' pts';
    document.getElementById('totalPtsCard').textContent    = (state.totalPoints || 0) + ' pts';

    // Today's earned points
    let todayPts = 0;
    for (const m of Object.values(state.meals)) { if (m) todayPts += (m.points || 0); }
    document.getElementById('todayPtsDisplay').textContent = `+${todayPts} today`;

    // Meal pills — now richer when done
    const row = document.getElementById('mealPillRow');
    row.innerHTML = '';

    for (const [meal, meta] of Object.entries(MEAL_META)) {
      const data = state.meals[meal]; // null or { label, points, foodName, … }
      const pill = document.createElement('div');

      if (data) {
        pill.className = 'meal-pill done';
        pill.innerHTML = `
          <div class="pill-left">
            <span>${meta.icon} ${meal}</span>
            <span style="opacity:0.6;font-size:11px;">· ${data.foodName || ''}</span>
          </div>
          <div class="pill-right">
            <span class="pill-pts">+${data.points} pts</span>
            <span class="pill-label">${data.label}</span>
          </div>`;
      } else {
        pill.className = 'meal-pill';
        pill.innerHTML = `
          <div class="pill-left"><span>${meta.icon} ${meal}</span></div>
          <div class="pill-right"><span class="pill-label" style="opacity:0.4;">Not scanned</span></div>`;
      }
      row.appendChild(pill);
    }
  }

  function resetPoints() {
    if (!confirm("Reset today's scans and points for dev testing?")) return;
    const state = getState();
    let todayPts = 0;
    for (const m of Object.values(state.meals)) { if (m) todayPts += (m.points || 0); }
    state.totalPoints = Math.max(0, (state.totalPoints || 0) - todayPts);
    state.meals = { Breakfast: null, Lunch: null, Dinner: null };
    localStorage.setItem('cfwState', JSON.stringify(state));
    renderProfile();
  }

  renderProfile();
</script>
</body>
</html>
