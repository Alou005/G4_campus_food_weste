<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Campus Food West – Food Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0d0d0d;
      display: flex; flex-direction: column; height: 100dvh;
    }

    .header {
      display: flex; align-items: center; justify-content: center;
      position: relative;
      padding-top: max(env(safe-area-inset-top), 14px);
      padding-left: 20px; padding-right: 20px; padding-bottom: 10px;
      flex-shrink: 0;
    }
    .back-btn {
      position: absolute; left: 20px; bottom: 10px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center; text-decoration: none;
    }
    .page-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #fff; }

    .viewfinder-wrap {
      position: relative; margin: 0 20px; border-radius: 20px;
      overflow: hidden; background: #000; flex-shrink: 0; height: 250px;
    }
    #videoFeed { width: 100%; height: 100%; object-fit: cover; display: block; }
    .scan-corners { position: absolute; inset: 0; pointer-events: none; }
    .corner { position: absolute; width: 28px; height: 28px; border-color: #ff9a00; border-style: solid; }
    .corner.tl { top: 16px; left: 16px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 16px; right: 16px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 16px; right: 16px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .scan-line {
      position: absolute; left: 16px; right: 16px; height: 2px;
      background: linear-gradient(90deg, transparent, #ff9a00, transparent);
      animation: scanMove 2s ease-in-out infinite; opacity: 0;
    }
    .scan-line.active { opacity: 1; }
    @keyframes scanMove {
      0%   { top: 16px; }
      50%  { top: calc(100% - 16px); }
      100% { top: 16px; }
    }
    .cam-placeholder {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      background: #111; color: rgba(255,255,255,0.4);
      font-size: 13px; text-align: center; padding: 20px;
    }
    .cam-placeholder svg { width: 48px; height: 48px; opacity: 0.3; }
    .pulse-ring {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center; pointer-events: none; opacity: 0;
    }
    .pulse-ring.active { opacity: 1; }
    .pulse-ring::before {
      content: ''; width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid #ff9a00; animation: pulse 1.2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2);   opacity: 0; }
    }

    /* Meal selector */
    .meal-selector {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 20px 4px; flex-shrink: 0;
    }
    .meal-selector label { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 500; white-space: nowrap; }
    .meal-selector select {
      flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; color: #fff; font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 600; padding: 7px 12px; appearance: none; cursor: pointer;
    }
    .meal-selector select option { background: #222; color: #fff; }

    /* Controls row: Flip | Camera FAB | Analyse */
    .controls {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; padding: 8px 20px 6px; flex-shrink: 0;
    }
    .ctrl-btn {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.07); border: none; border-radius: 16px;
      padding: 12px 18px; color: #fff; font-family: 'Poppins', sans-serif;
      font-size: 11px; cursor: pointer; transition: background 0.2s;
      flex: 1; max-width: 90px;
    }
    .ctrl-btn:hover:not(:disabled) { background: rgba(255,255,255,0.13); }
    .ctrl-btn svg { width: 22px; height: 22px; fill: #fff; }
    .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .scan-fab {
      width: 68px; height: 68px; border-radius: 50%; background: #ff9a00;
      border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 6px 24px rgba(255,154,0,0.5);
      transition: transform 0.2s; flex-shrink: 0;
    }
    .scan-fab:hover { transform: scale(1.06); }
    .scan-fab svg { width: 30px; height: 30px; fill: #fff; }
    .scan-fab.scanning { background: #cc3300; box-shadow: 0 6px 24px rgba(204,51,0,0.5); }

    /* Result Panel */
    .result-panel {
      flex: 1; overflow-y: auto; margin: 0 20px 8px;
      border-radius: 20px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      scrollbar-width: none; display: flex; flex-direction: column; min-height: 0;
    }
    .result-panel::-webkit-scrollbar { display: none; }

    .result-idle {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      color: rgba(255,255,255,0.25); font-size: 13px; text-align: center; padding: 20px;
    }
    .result-idle svg { width: 36px; height: 36px; opacity: 0.2; }

    .thinking {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 30px; flex: 1;
      color: rgba(255,255,255,0.5); font-size: 13px;
    }
    .thinking.visible { display: flex; }
    .dots span {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #ff9a00; margin: 0 3px; animation: dotBounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-8px); opacity: 1; }
    }

    .result-content { display: none; flex-direction: column; padding: 4px 0; }
    .result-content.visible { display: flex; }

    .result-food-name {
      font-size: 15px; font-weight: 700; color: #fff;
      padding: 12px 18px 4px; letter-spacing: 0.3px;
    }

    .pts-earned-banner {
      margin: 4px 18px 8px; border-radius: 12px; padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .pts-earned-banner.high   { background: rgba(88,185,71,0.18);  border: 1px solid #58b947; }
    .pts-earned-banner.medium { background: rgba(255,154,0,0.18);  border: 1px solid #ff9a00; }
    .pts-earned-banner.low    { background: rgba(255,80,0,0.18);   border: 1px solid #ff5000; }
    .pts-earned-banner.vlow   { background: rgba(200,0,0,0.18);    border: 1px solid #c00; }
    .pts-earned-icon { font-size: 22px; }
    .pts-earned-text { flex: 1; }
    .pts-earned-label { font-size: 12px; color: rgba(255,255,255,0.6); }
    .pts-earned-value { font-size: 18px; font-weight: 700; color: #fff; }

    .result-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 18px; border-bottom: 1.5px solid rgba(255,255,255,0.07);
    }
    .result-row:last-child { border-bottom: none; }
    .row-label { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6); flex: 1; }
    .row-value { font-size: 13px; font-weight: 600; color: #fff; text-align: right; }

    /* ── SAVE BUTTON (replaces old "Ready" badge) ── */
    .save-btn {
      margin: 0 18px 14px; background: #58b947; color: #fff; border: none;
      border-radius: 14px; padding: 14px; font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer;
      display: none; width: calc(100% - 36px); transition: background 0.2s, opacity 0.2s;
      letter-spacing: 0.3px;
    }
    .save-btn:hover:not(:disabled) { background: #4da83e; }
    .save-btn.visible { display: block; }
    .save-btn:disabled { background: #444; color: rgba(255,255,255,0.5); cursor: not-allowed; }

    /* Bottom Nav */
    .bottom-nav {
      background: #1a1a1a; display: flex; align-items: center;
      justify-content: space-between; padding: 0 44px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      height: calc(70px + env(safe-area-inset-bottom, 0px));
      position: relative; flex-shrink: 0; z-index: 10;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; text-decoration: none;
      color: #fff; padding: 8px 16px; border-radius: 16px; transition: background 0.2s;
    }
    .nav-item.active { background: #333; }
    .nav-label { font-size: 11px; color: #fff; font-family: 'Poppins', sans-serif; }
    .nav-spacer { width: 64px; }
    .cam-fab-nav {
      width: 56px; height: 56px; border-radius: 50%; background: #ff9a00;
      display: flex; align-items: center; justify-content: center;
      position: absolute; left: 50%; transform: translateX(-50%) translateY(-20px);
      box-shadow: 0 6px 20px rgba(255,154,0,0.5); cursor: pointer; border: 4px solid #1a1a1a;
    }

    /* API key banner */
    .api-banner {
      background: rgba(255,100,0,0.18); border: 1px solid #ff6400;
      border-radius: 12px; margin: 0 20px 6px; padding: 10px 14px;
      font-size: 12px; color: rgba(255,255,255,0.85); display: none; flex-shrink: 0;
    }
    .api-banner.visible { display: block; }
    .api-banner input {
      width: 100%; margin-top: 6px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      color: #fff; font-family: 'Poppins', sans-serif; font-size: 12px;
      padding: 7px 10px; outline: none;
    }
    .api-banner button {
      margin-top: 6px; width: 100%; background: #ff6400; border: none;
      border-radius: 8px; color: #fff; font-family: 'Poppins', sans-serif;
      font-size: 12px; font-weight: 700; padding: 7px; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="#fff" width="18" height="18">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
      </svg>
    </a>
    <span class="page-title">Food Scanner</span>
  </div>

  <div class="viewfinder-wrap">
    <video id="videoFeed" autoplay playsinline muted></video>
    <div class="cam-placeholder" id="camPlaceholder">
      <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm0-8.4a5.2 5.2 0 1 1 0 10.4A5.2 5.2 0 0 1 12 6.8zM9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9zm3 15a6 6 0 1 1 0-12 6 6 0 0 1 0 12z"/></svg>
      Tap the camera button below to start
    </div>
    <div class="scan-corners">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <div class="scan-line" id="scanLine"></div>
    <div class="pulse-ring" id="pulseRing"></div>
  </div>

  <!-- Meal selector -->
  <div class="meal-selector">
    <label for="mealSelect">Meal:</label>
    <select id="mealSelect">
      <option value="Breakfast">🌅 Breakfast</option>
      <option value="Lunch">☀️ Lunch</option>
      <option value="Dinner">🌙 Dinner</option>
    </select>
  </div>

  <!-- API key entry (shown if key missing) -->
  <div class="api-banner" id="apiBanner">
    ⚠️ Enter your Anthropic API key to enable food analysis:
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." />
    <button onclick="saveApiKey()">Save API Key</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn" onclick="flipCamera()">
      <svg viewBox="0 0 24 24"><path d="M7.11 8.53 5.7 7.11C4.8 8.27 4.24 9.61 4.07 11h2.02c.14-.87.49-1.72 1.02-2.47zM6.09 13H4.07c.17 1.39.72 2.73 1.62 3.89l1.41-1.42A5.2 5.2 0 0 1 6.09 13zm1.01 5.32c1.16.9 2.51 1.44 3.9 1.61V17.9c-.87-.15-1.71-.49-2.46-1.03L7.1 18.32zM13 4.07V1L8.45 5.55 13 10V6.09c2.84.48 5 2.94 5 5.91s-2.16 5.43-5 5.91v2.02c3.95-.49 7-3.85 7-7.93s-3.05-7.44-7-7.93z"/></svg>
      Flip
    </button>
    <button class="scan-fab" id="scanBtn" onclick="toggleCamera()">
      <svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm0-8.4a5.2 5.2 0 1 1 0 10.4A5.2 5.2 0 0 1 12 6.8zM9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9z"/></svg>
    </button>
    <button class="ctrl-btn" id="captureBtn" onclick="captureAndAnalyze()" disabled>
      <svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zM20 4h-1V2h-2v2H7V2H5v2H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 18H4V10h16v12z"/></svg>
      Analyse
    </button>
  </div>

  <!-- Result Panel -->
  <div class="result-panel">
    <div class="result-idle" id="resultIdle">
      <svg viewBox="0 0 24 24" fill="#fff"><path d="M11 9h2V7h-2v2zm1 13C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm0-18a8 8 0 1 0 0 16A8 8 0 0 0 12 4zm-1 9h2v6h-2v-6z"/></svg>
      Start camera → aim at your food → tap <strong style="color:#ff9a00">&nbsp;Analyse</strong>
    </div>
    <div class="thinking" id="thinkingState">
      <div class="dots"><span></span><span></span><span></span></div>
      Identifying food item…
    </div>
    <div class="result-content" id="resultContent">
      <div class="result-food-name" id="foodName">—</div>
      <div class="pts-earned-banner" id="ptsBanner">
        <div class="pts-earned-icon" id="ptsIcon">⭐</div>
        <div class="pts-earned-text">
          <div class="pts-earned-label" id="ptsLabel">Eating status</div>
          <div class="pts-earned-value" id="ptsValue">—</div>
        </div>
      </div>
      <div class="result-row">
        <span class="row-label">Meal slot</span>
        <span class="row-value" id="rowMeal">—</span>
      </div>
      <div class="result-row">
        <span class="row-label">Waste level</span>
        <span class="row-value" id="rowWaste">—</span>
      </div>
      <div class="result-row">
        <span class="row-label">Eating status</span>
        <span class="row-value" id="rowStatus">—</span>
      </div>
    </div>
    <!-- SAVE BUTTON — replaces old Ready badge -->
    <button class="save-btn" id="saveBtn" onclick="saveScan()">💾 Save to Home &amp; Profile</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <img src="Element/Home.png" alt="Home" width="28" height="20" />
      <span class="nav-label">Home</span>
    </a>
    <div class="nav-spacer"></div>
    <a href="profile.html" class="nav-item">
      <img src="Element/Profile.png" alt="Profile" width="34" height="22" />
      <span class="nav-label">Profile</span>
    </a>
    <div class="cam-fab-nav" onclick="window.location.href='scanner.html'">
      <img src="Element/Camera Icon.png" alt="Scan" width="30" height="22" />
    </div>
  </nav>

<script>
  // ─────────────────────────────────────────────
  //  CONFIG — paste your Anthropic API key here
  //  OR enter it in the banner that appears on screen
  // ─────────────────────────────────────────────
  const HARDCODED_KEY = ''; // e.g. 'sk-ant-api03-XXXX'

  // ── API key management ──
  function getApiKey() {
    return HARDCODED_KEY || localStorage.getItem('cfwApiKey') || '';
  }
  function saveApiKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val.startsWith('sk-')) { alert('Invalid key — must start with sk-'); return; }
    localStorage.setItem('cfwApiKey', val);
    document.getElementById('apiBanner').classList.remove('visible');
    alert('API key saved! You can now scan food.');
  }
  function checkApiKey() {
    if (!getApiKey()) document.getElementById('apiBanner').classList.add('visible');
  }
  checkApiKey();

  // ── Scoring ──
  function scoreFromWaste(pct) {
    if (pct <= 10) return { label: 'Eat clean',               points: 100, tier: 'high'   };
    if (pct <= 40) return { label: 'Eat a little clean',      points: 60,  tier: 'medium' };
    if (pct <= 80) return { label: 'Eat left normal',         points: 30,  tier: 'low'    };
    return               { label: 'Too much food waste left', points: 5,   tier: 'vlow'   };
  }
  const tierIcon = { high: '🌟', medium: '⭐', low: '🍽️', vlow: '😔' };

  // ── Auto-select meal by time ──
  (function autoMeal() {
    const h = new Date().getHours();
    document.getElementById('mealSelect').value =
      h < 11 ? 'Breakfast' : h < 15 ? 'Lunch' : 'Dinner';
  })();

  // ── State helpers ──
  function getState() {
    const today = new Date().toDateString();
    let s = null;
    try { s = JSON.parse(localStorage.getItem('cfwState')); } catch(e) {}
    if (!s || s.date !== today) {
      s = { date: today, totalPoints: (s && s.totalPoints) || 0,
            meals: { Breakfast: null, Lunch: null, Dinner: null } };
      localStorage.setItem('cfwState', JSON.stringify(s));
    }
    if (!s.meals) s.meals = { Breakfast: null, Lunch: null, Dinner: null };
    return s;
  }
  function saveState(s) { localStorage.setItem('cfwState', JSON.stringify(s)); }

  // ── Camera ──
  let stream = null, facingMode = 'environment', cameraActive = false;

  async function toggleCamera() {
    cameraActive ? stopCamera() : await startCamera();
  }
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false
      });
      const v = document.getElementById('videoFeed');
      v.srcObject = stream; await v.play();
      cameraActive = true;
      document.getElementById('camPlaceholder').style.display = 'none';
      document.getElementById('scanLine').classList.add('active');
      document.getElementById('scanBtn').classList.add('scanning');
      document.getElementById('captureBtn').disabled = false;
      document.getElementById('scanBtn').innerHTML =
        `<svg viewBox="0 0 24 24" fill="#fff" width="30" height="30"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>`;
    } catch {
      alert('Camera access denied. Please allow camera permission.');
    }
  }
  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    document.getElementById('videoFeed').srcObject = null;
    cameraActive = false;
    document.getElementById('camPlaceholder').style.display = 'flex';
    document.getElementById('scanLine').classList.remove('active');
    document.getElementById('scanBtn').classList.remove('scanning');
    document.getElementById('captureBtn').disabled = true;
    document.getElementById('scanBtn').innerHTML =
      `<svg viewBox="0 0 24 24" fill="#fff" width="30" height="30"><path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm0-8.4a5.2 5.2 0 1 1 0 10.4A5.2 5.2 0 0 1 12 6.8zM9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9z"/></svg>`;
  }
  async function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    if (cameraActive) { stopCamera(); await startCamera(); }
  }

  // ── Capture & Analyse ──
  let pendingResult = null;

  async function captureAndAnalyze() {
    if (!cameraActive) return;
    const key = getApiKey();
    if (!key) { document.getElementById('apiBanner').classList.add('visible'); return; }

    // Check meal not already scanned
    const meal  = document.getElementById('mealSelect').value;
    const state = getState();
    if (state.meals[meal]) {
      if (!confirm(`You already scanned ${meal} today. Scan again to replace it?`)) return;
    }

    // Pulse animation
    const pulse = document.getElementById('pulseRing');
    pulse.classList.add('active');
    setTimeout(() => pulse.classList.remove('active'), 1200);

    // Grab frame from video
    const video  = document.getElementById('videoFeed');
    const canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const base64Image = canvas.toDataURL('image/jpeg', 0.82).split(',')[1];

    showState('thinking');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 500,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64Image } },
              { type: 'text', text:
`You are a food recognition AI for a university campus food tracking app.
The student's meal is "${meal}". Look at the plate/tray in the image.

Reply ONLY with this exact JSON (no markdown, no extra text):
{"name":"<food name>","wastePercent":<0-100>,"statusNote":"<short friendly note>"}

wastePercent = how much food is LEFT uneaten. 0 = plate totally clean. 100 = nothing eaten.
If no food visible: {"name":"No food detected","wastePercent":100,"statusNote":"Point the camera at your food plate"}` }
            ]
          }]
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const raw  = (data.content || []).map(b => b.text || '').join('').trim();
      let ai;
      try {
        // Strip any accidental markdown fences
        const clean = raw.replace(/^```[a-z]*\n?/i,'').replace(/```$/,'').trim();
        ai = JSON.parse(clean);
      } catch {
        ai = { name: 'Could not read result', wastePercent: 50, statusNote: 'Try again' };
      }

      const score   = scoreFromWaste(Number(ai.wastePercent) || 0);
      pendingResult = {
        meal,
        foodName:     ai.name        || 'Unknown food',
        wastePercent: Number(ai.wastePercent) || 0,
        statusNote:   ai.statusNote  || '',
        label:        score.label,
        points:       score.points,
        tier:         score.tier
      };
      displayResult(pendingResult);

    } catch(err) {
      console.error('API error:', err);
      // Still show a result panel so the user sees the error clearly
      pendingResult = null;
      showState('result');
      document.getElementById('foodName').textContent   = '⚠️ Analysis failed';
      document.getElementById('ptsBanner').className    = 'pts-earned-banner vlow';
      document.getElementById('ptsIcon').textContent    = '❌';
      document.getElementById('ptsLabel').textContent   = err.message || 'Network error';
      document.getElementById('ptsValue').textContent   = '—';
      document.getElementById('rowMeal').textContent    = meal;
      document.getElementById('rowWaste').textContent   = '—';
      document.getElementById('rowStatus').textContent  = 'Check your API key and internet connection';
      document.getElementById('saveBtn').classList.remove('visible');
    }
  }

  function displayResult(r) {
    document.getElementById('foodName').textContent = r.foodName;

    const banner = document.getElementById('ptsBanner');
    banner.className = 'pts-earned-banner ' + r.tier;
    document.getElementById('ptsIcon').textContent  = tierIcon[r.tier] || '⭐';
    document.getElementById('ptsLabel').textContent = r.label;              // "Eat clean" etc.
    document.getElementById('ptsValue').textContent = `+${r.points} pts`;

    document.getElementById('rowMeal').textContent   = r.meal;
    document.getElementById('rowWaste').textContent  = r.wastePercent + '% waste left';
    document.getElementById('rowStatus').textContent = r.statusNote;

    // Save button
    const saveBtn = document.getElementById('saveBtn');
    const state   = getState();
    if (state.meals[r.meal]) {
      saveBtn.textContent = `✓ ${r.meal} already saved — tap to replace`;
      saveBtn.disabled    = false;
    } else {
      saveBtn.textContent = `💾 Save to Home & Profile  (+${r.points} pts)`;
      saveBtn.disabled    = false;
    }
    saveBtn.classList.add('visible');

    showState('result');
  }

  // ── SAVE to localStorage ──
  function saveScan() {
    if (!pendingResult) return;
    const state = getState();
    const meal  = pendingResult.meal;

    // Write the meal entry — all fields needed by Home + Profile
    state.meals[meal] = {
      foodName:     pendingResult.foodName,
      label:        pendingResult.label,        // "Eat clean" / "Eat a little clean" / etc.
      points:       pendingResult.points,
      tier:         pendingResult.tier,
      wastePercent: pendingResult.wastePercent,
      statusNote:   pendingResult.statusNote
    };

    // Recalculate total from all meals (avoids double-count on replace)
    let total = 0;
    for (const m of Object.values(state.meals)) { if (m) total += (m.points || 0); }
    state.totalPoints = total;

    saveState(state);

    // Feedback then go home
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.textContent = `✓ Saved! +${pendingResult.points} pts added to ${meal}`;
    saveBtn.disabled    = true;

    setTimeout(() => { window.location.href = 'index.html'; }, 1100);
  }

  // ── UI state switcher ──
  function showState(st) {
    document.getElementById('resultIdle').style.display    = st === 'idle'     ? 'flex' : 'none';
    document.getElementById('thinkingState').style.display = st === 'thinking' ? 'flex' : 'none';
    document.getElementById('resultContent').classList.toggle('visible', st === 'result');
    if (st !== 'result') document.getElementById('saveBtn').classList.remove('visible');
  }
</script>
