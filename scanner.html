<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Food West – Food Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    /* ── Phone Frame ── */
    .android-frame {
      width: 393px;
      height: 852px;
      background: #0d0d0d;
      border: 8px solid #161616;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 0 2px #444, 0 30px 80px rgba(0,0,0,.35);
    }

    /* ── Dynamic Island ── */
    .dynamic-island {
      width: 126px;
      height: 36px;
      background: #1a1a1a;
      border-radius: 0 0 24px 24px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 14px 20px 10px;
      flex-shrink: 0;
    }

    .back-btn {
      position: absolute;
      left: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    /* ── Camera Viewfinder ── */
    .viewfinder-wrap {
      position: relative;
      margin: 0 20px;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      flex-shrink: 0;
      height: 300px;
    }

    #videoFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Scanning overlay corners */
    .scan-corners {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #ff9a00;
      border-style: solid;
    }
    .corner.tl { top: 16px; left: 16px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 16px; right: 16px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 16px; right: 16px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      left: 16px;
      right: 16px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff9a00, transparent);
      animation: scanMove 2s ease-in-out infinite;
      opacity: 0;
    }
    .scan-line.active { opacity: 1; }

    @keyframes scanMove {
      0%   { top: 16px; }
      50%  { top: calc(100% - 16px); }
      100% { top: 16px; }
    }

    /* Camera placeholder when off */
    .cam-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #111;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
    }
    .cam-placeholder svg { width: 48px; height: 48px; opacity: 0.3; }

    /* Scanning pulse ring */
    .pulse-ring {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }
    .pulse-ring.active { opacity: 1; }
    .pulse-ring::before {
      content: '';
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #ff9a00;
      animation: pulse 1.2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2);   opacity: 0; }
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 16px 20px 10px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.07);
      border: none;
      border-radius: 16px;
      padding: 12px 18px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
      flex: 1;
      max-width: 90px;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.13); }
    .ctrl-btn svg { width: 22px; height: 22px; fill: #ffffff; }

    .scan-fab {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #ff9a00;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,154,0,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }
    .scan-fab:hover { transform: scale(1.06); box-shadow: 0 8px 28px rgba(255,154,0,0.65); }
    .scan-fab svg { width: 32px; height: 32px; fill: #fff; }
    .scan-fab.scanning { background: #cc3300; box-shadow: 0 6px 24px rgba(204,51,0,0.5); }

    /* ── Result Panel ── */
    .result-panel {
      flex: 1;
      overflow-y: auto;
      margin: 0 20px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
    }
    .result-panel::-webkit-scrollbar { display: none; }

    .result-idle {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255,255,255,0.25);
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }
    .result-idle svg { width: 36px; height: 36px; opacity: 0.2; }

    .result-content {
      display: none;
      padding: 4px 0;
      flex-direction: column;
    }
    .result-content.visible { display: flex; }

    /* Food name header inside panel */
    .result-food-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      padding: 12px 18px 8px;
      letter-spacing: 0.3px;
    }

    /* Each result row — matches screenshot style */
    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1.5px solid #b8860b;
    }
    .result-row:last-child { border-bottom: none; }

    .row-label {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex: 1;
    }

    .row-value {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      text-align: right;
    }

    /* Thinking state */
    .thinking {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 30px;
      flex: 1;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
    }
    .thinking.visible { display: flex; }

    .dots span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff9a00;
      margin: 0 3px;
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-8px); opacity: 1; }
    }

    /* ── Bottom Navigation ── */
    .bottom-nav {
      height: 72px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      position: relative;
      flex-shrink: 0;
      z-index: 10;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 16px;
      transition: background 0.2s;
    }
    .nav-item.active { background: #333; }
    .nav-label { font-size: 11px; color: #fff; font-family: 'Poppins', sans-serif; }
    .nav-spacer { width: 64px; }

    .cam-fab-nav {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #ff9a00;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      box-shadow: 0 6px 20px rgba(255,154,0,0.5);
      cursor: pointer;
      border: 4px solid #1a1a1a;
    }
  </style>
</head>
<body>

<div class="android-frame">

  <!-- Dynamic Island -->
  <div class="dynamic-island"></div>

  <!-- Header -->
  <div class="header">
    <a href="Home.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="#fff" width="18" height="18">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
      </svg>
    </a>
    <span class="page-title">Food Scanner</span>
  </div>

  <!-- Live Camera Viewfinder -->
  <div class="viewfinder-wrap">
    <video id="videoFeed" autoplay playsinline muted></video>

    <!-- Placeholder shown before camera starts -->
    <div class="cam-placeholder" id="camPlaceholder">
      <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm0-8.4a5.2 5.2 0 1 1 0 10.4A5.2 5.2 0 0 1 12 6.8zM9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9zm3 15a6 6 0 1 1 0-12 6 6 0 0 1 0 12z"/></svg>
      Tap the button below to start scanning
    </div>

    <!-- Corner guides -->
    <div class="scan-corners">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>

    <!-- Animated scan line -->
    <div class="scan-line" id="scanLine"></div>

    <!-- Pulse ring on capture -->
    <div class="pulse-ring" id="pulseRing"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn" id="flipBtn" onclick="flipCamera()">
      <svg viewBox="0 0 24 24"><path d="M7.11 8.53 5.7 7.11C4.8 8.27 4.24 9.61 4.07 11h2.02c.14-.87.49-1.72 1.02-2.47zM6.09 13H4.07c.17 1.39.72 2.73 1.62 3.89l1.41-1.42A5.2 5.2 0 0 1 6.09 13zm1.01 5.32c1.16.9 2.51 1.44 3.9 1.61V17.9c-.87-.15-1.71-.49-2.46-1.03L7.1 18.32zM13 4.07V1L8.45 5.55 13 10V6.09c2.84.48 5 2.94 5 5.91s-2.16 5.43-5 5.91v2.02c3.95-.49 7-3.85 7-7.93s-3.05-7.44-7-7.93z"/></svg>
      Flip
    </button>

    <button class="scan-fab" id="scanBtn" onclick="toggleCamera()">
      <!-- Camera icon -->
      <svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm0-8.4a5.2 5.2 0 1 1 0 10.4A5.2 5.2 0 0 1 12 6.8zM9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9z"/></svg>
    </button>

    <button class="ctrl-btn" id="captureBtn" onclick="captureAndAnalyze()" disabled>
      <svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zM20 4h-1V2h-2v2H7V2H5v2H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 18H4V10h16v12z"/></svg>
      Analyse
    </button>
  </div>

  <!-- Result Panel -->
  <div class="result-panel">

    <!-- Idle state -->
    <div class="result-idle" id="resultIdle">
      <svg viewBox="0 0 24 24" fill="#fff"><path d="M11 9h2V7h-2v2zm1 13C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm0-18a8 8 0 1 0 0 16A8 8 0 0 0 12 4zm-1 9h2v6h-2v-6z"/></svg>
      Point the camera at any food item, then tap <strong style="color:#ff9a00">&nbsp;Analyse</strong>
    </div>

    <!-- Thinking / loading -->
    <div class="thinking" id="thinkingState">
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
      Identifying food item…
    </div>

    <!-- Result content -->
    <div class="result-content" id="resultContent">
      <div class="result-food-name" id="foodName">—</div>
      <div class="result-row">
        <span class="row-label">Your eating time</span>
        <span class="row-value" id="rowMealTime">—</span>
      </div>
      <div class="result-row">
        <span class="row-label">Your eating status</span>
        <span class="row-value" id="rowStatus">—</span>
      </div>
      <div class="result-row">
        <span class="row-label" id="rowScoreLabel">Your score</span>
        <span class="row-value" id="rowScore">—</span>
      </div>
    </div>

  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="Home.html" class="nav-item">
      <img src="Element/Home.png" alt="Home" width="28" height="20" />
      <span class="nav-label">Home</span>
    </a>
    <div class="nav-spacer"></div>
    <a href="profile.html" class="nav-item">
      <img src="Element/Profile.png" alt="Profile" width="34" height="22" />
      <span class="nav-label">Profile</span>
    </a>
    <div class="cam-fab-nav">
      <img src="Element/Camera Icon.png" alt="Scan" width="30" height="22" />
    </div>
  </nav>

</div>

<script>
  let stream = null;
  let facingMode = 'environment'; // rear camera by default
  let cameraActive = false;

  // ── Start / Stop Camera ──
  async function toggleCamera() {
    if (cameraActive) {
      stopCamera();
    } else {
      await startCamera();
    }
  }

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      const video = document.getElementById('videoFeed');
      video.srcObject = stream;
      await video.play();

      cameraActive = true;
      document.getElementById('camPlaceholder').style.display = 'none';
      document.getElementById('scanLine').classList.add('active');
      document.getElementById('scanBtn').classList.add('scanning');
      document.getElementById('captureBtn').disabled = false;

      // Change scan button to stop icon
      document.getElementById('scanBtn').innerHTML = `
        <svg viewBox="0 0 24 24" fill="#fff" width="32" height="32">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>`;
    } catch (err) {
      alert('Camera access denied. Please allow camera permission and try again.');
      console.error(err);
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    const video = document.getElementById('videoFeed');
    video.srcObject = null;
    cameraActive = false;
    document.getElementById('camPlaceholder').style.display = 'flex';
    document.getElementById('scanLine').classList.remove('active');
    document.getElementById('scanBtn').classList.remove('scanning');
    document.getElementById('captureBtn').disabled = true;
    document.getElementById('scanBtn').innerHTML = `
      <svg viewBox="0 0 24 24" fill="#fff" width="32" height="32">
        <path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm0-8.4a5.2 5.2 0 1 1 0 10.4A5.2 5.2 0 0 1 12 6.8zM9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9z"/>
      </svg>`;
  }

  // ── Flip Camera ──
  async function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    if (cameraActive) {
      stopCamera();
      await startCamera();
    }
  }

  // ── Capture Frame & Send to Claude AI ──
  async function captureAndAnalyze() {
    if (!cameraActive) return;

    // Flash pulse ring
    const pulse = document.getElementById('pulseRing');
    pulse.classList.add('active');
    setTimeout(() => pulse.classList.remove('active'), 1200);

    // Capture frame from video
    const video = document.getElementById('videoFeed');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const base64Image = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

    // Show thinking state
    showState('thinking');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: { type: 'base64', media_type: 'image/jpeg', data: base64Image }
              },
              {
                type: 'text',
                text: `You are a food recognition AI for a university campus food app. Analyze this image and identify the food item shown.

Respond ONLY with a valid JSON object in this exact format (no markdown, no backticks):
{
  "name": "Food name here",
  "mealTime": "Breakfast or Lunch or Dinner depending on what type of food this is",
  "status": "0-10% or 10-30% or 30-60% or 60-80% or 80-100% based on how healthy/campus-appropriate the food is",
  "score": "a number out of 100 pts based on nutritional value and campus meal appropriateness e.g. 85 pts"
}

If you cannot identify food in the image, return:
{"name": "No food detected", "mealTime": "—", "status": "—", "score": "—"}`
              }
            ]
          }]
        })
      });

      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('');

      let result;
      try {
        const clean = raw.replace(/```json|```/g, '').trim();
        result = JSON.parse(clean);
      } catch {
        result = {
          name: 'Analysis error',
          mealTime: '—',
          status: '—',
          score: '—'
        };
      }

      displayResult(result);

    } catch (err) {
      console.error(err);
      displayResult({
        name: 'Connection error',
        mealTime: '—',
        status: '—',
        score: '—'
      });
    }
  }

  function displayResult(r) {
    document.getElementById('foodName').textContent = r.name;
    document.getElementById('rowMealTime').textContent = r.mealTime || '—';
    document.getElementById('rowStatus').textContent = r.status || '—';
    document.getElementById('rowScoreLabel').textContent = 'Your score for ' + (r.mealTime ? r.mealTime.toLowerCase() : 'this meal');
    document.getElementById('rowScore').textContent = r.score || '—';
    showState('result');
  }

  function showState(state) {
    document.getElementById('resultIdle').style.display    = state === 'idle'     ? 'flex' : 'none';
    document.getElementById('thinkingState').style.display = state === 'thinking'  ? 'flex' : 'none';
    document.getElementById('resultContent').classList.toggle('visible', state === 'result');
  }
</script>

</body>
</html>
